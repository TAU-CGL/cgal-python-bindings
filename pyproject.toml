[build-system]
requires = [
    "conan>=2.0.0",
    "setuptools",
    "scikit-build>=0.13",
    "cmake>=3.26",
    "ninja"
]
build-backend = "setuptools.build_meta"
[tool.cibuildwheel]
manylinux-x86_64-image = "manylinux_2_28"
# manylinux-i686-image = "manylinux_2_28"
# manylinux-aarch64-image = "manylinux_2_28"
# manylinux-ppc64le-image = "manylinux_2_28"
# manylinux-s390x-image = "manylinux_2_28"
build = "cp310-* cp311-* cp312-*"
before-build = "echo $(pwd) && dnf install -y wget eigen3-devel mpfr-devel gmp-devel && wget https://github.com/CGAL/cgal/archive/refs/tags/v6.0-beta1.tar.gz && tar -xvf v6.0-beta1.tar.gz && wget https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz && tar -xf boost_1_86_0.tar.gz && cd boost_1_86_0 && ./bootstrap.sh && ./b2 install --prefix=/usr/local && export Boost_INCLUDE_DIR=/usr/local/include && pip install conan && conan profile detect"
environment = {CGAL_DIR="/project/cgal-6.0-beta1", CGALPY_PYPI="1"}



