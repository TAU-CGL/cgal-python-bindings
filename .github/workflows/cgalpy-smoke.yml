              ;;
            sn2_epic)
              pairs=(
                sn2_create_offset_polygons_2
              )
              ;;
            sm_smsk_epic)
              pairs=(
                smsk_simple_mcfskel_sm_example
              )
              ;;
            tri2_ct_wi_epic)
              pairs=(
                tri2_for_loop_2
              )
              ;;
            tri3_del_epic)
              pairs=(
                tri3_for_loop
              )
              ;;
            trid_del_epicd_7)
              pairs=(
                trid_delaunay_triangulation
              )
              ;;
            as3_del_fast_epic)
              pairs=(
                as3_alpha_shapes_exact_alpha
              )
              ;;
            bso2_seg_epec)
              pairs=(
                bso2_simple_join_intersect
                bso2_symmetric_difference
                bso2_sequence
                bso2_do_intersect
                bso2_oriented_side
                bso2_connect_polygon
              )
