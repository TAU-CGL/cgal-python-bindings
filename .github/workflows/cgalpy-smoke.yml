              )
              ;;
            bso2_conic_epec)
              pairs=(
                bso2_conic_traits_adapter
              )
              ;;
            bso2_bezier_ccr)
              pairs=(
                bso2_bezier_traits_adapter
                bso2_bezier_traits_adapter2
              )
              ;;
            pol2_bso2_seg_epec)
              pairs=(
                pol2_polygon
                pol2_polygon_algorithms
                pol2_ranges
                pol2_example
              )
              ;;
            ms2_seg_epec)
              pairs=(
                ms2_sum_triangle_square
                ms2_sum_with_holes
                ms2_sum_by_decomposition
                ms2_sum_of_holes
                ms2_approx_offset
                ms2_approx_inset
              )
              ;;
            ss2_seg_epec)
              pairs=(
                ss2_plane_sweep
              )
              ;;
            env2_seg_cd_epec)
              pairs=(
                env2_envelope_segments
              )
              ;;
            env2_linear_cd_epec)
              pairs=(
