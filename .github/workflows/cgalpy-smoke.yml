name: CGALPY smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - gsoc2026
  push:
    branches:
      - gsoc2026

jobs:
  kernel-linux:
    name: ${{ matrix.label }} kernel smoke on Linux (${{ matrix.compiler_label }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - config: epec
            label: EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/epec.cmake
            module_name: CGALPY_kerEpecInt
            package_name: CGALPY_kerEpecInt
            wheel_pattern: cgalpy_kerepecint-*.whl
            extra_submodule: ""
          - config: epec_gcc
            label: EPEC
            compiler_label: GCC
            cc: gcc
            cxx: g++
            cmake_config: cmake/tests/epec.cmake
            module_name: CGALPY_kerEpecInt
            package_name: CGALPY_kerEpecInt
            wheel_pattern: cgalpy_kerepecint-*.whl
            extra_submodule: ""
          - config: epic
            label: EPIC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/epic.cmake
            module_name: CGALPY_kerEpic
            package_name: CGALPY_kerEpic
            wheel_pattern: cgalpy_kerepic-*.whl
            extra_submodule: ""
          - config: aos2_seg_epec
            label: AOS2 segment EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/aos2_seg_epec.cmake
            module_name: CGALPY_kerEpecInt_aos2SegPl
            package_name: CGALPY_kerEpecInt_aos2SegPl
            wheel_pattern: cgalpy_kerepecint_aos2segpl-*.whl
            extra_submodule: Aos2
          - config: bso2_seg_epec
            label: BSO2 segment EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/bso2_seg_epec.cmake
            module_name: CGALPY_kerEpecInt_aos2Seg_bso2_pol2
            package_name: CGALPY_kerEpecInt_aos2Seg_bso2_pol2
            wheel_pattern: cgalpy_kerepecint_aos2seg_bso2_pol2-*.whl
            extra_submodule: Bso2
          - config: bso2_cs_epec
            label: BSO2 circle-segment EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/bso2_cs_epec.cmake
            module_name: CGALPY_kerEpecInt_aos2Cs_bso2
            package_name: CGALPY_kerEpecInt_aos2Cs_bso2
            wheel_pattern: cgalpy_kerepecint_aos2cs_bso2-*.whl
            extra_submodule: Bso2
          - config: bso2_conic_epec
            label: BSO2 conic EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/bso2_conic_epec.cmake
            module_name: CGALPY_kerEpec_aos2Conic_bso2
            package_name: CGALPY_kerEpec_aos2Conic_bso2
            wheel_pattern: cgalpy_kerepec_aos2conic_bso2-*.whl
            extra_submodule: Bso2
          - config: bso2_bezier_ccr
            label: BSO2 Bezier CCR
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/bso2_bezier_ccr.cmake
            module_name: CGALPY_kerCcrInt_aos2Bez_bso2
            package_name: CGALPY_kerCcrInt_aos2Bez_bso2
            wheel_pattern: cgalpy_kerccrint_aos2bez_bso2-*.whl
            extra_submodule: Bso2
          - config: ss2_seg_epec
            label: SS2 segment EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/ss2_seg_epec.cmake
            module_name: CGALPY_kerEpecInt_aos2SegPl_ss2
            package_name: CGALPY_kerEpecInt_aos2SegPl_ss2
            wheel_pattern: cgalpy_kerepecint_aos2segpl_ss2-*.whl
            extra_submodule: Ss2
          - config: ms2_seg_epec
            label: MS2 segment EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/ms2_seg_epec.cmake
            module_name: CGALPY_kerEpecInt_aos2SegPl_bso2_ms2_pol2_pp
            package_name: CGALPY_kerEpecInt_aos2SegPl_bso2_ms2_pol2_pp
            wheel_pattern: cgalpy_kerepecint_aos2segpl_bso2_ms2_pol2_pp-*.whl
            extra_submodule: Ms2
          - config: tri2_ct_wi_epic
            label: TRI2 constrained-Delaunay EPIC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/tri2_ct_wi_epic.cmake
            module_name: CGALPY_kerEpic_tri2CdelNciWiWi
            package_name: CGALPY_kerEpic_tri2CdelNciWiWi
            wheel_pattern: cgalpy_kerepic_tri2cdelnciwiwi-*.whl
            extra_submodule: Tri2
          - config: tri3_del_epic
            label: TRI3 Delaunay EPIC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/tri3_del_epic.cmake
            module_name: CGALPY_kerEpic_tri3DelComSeq
            package_name: CGALPY_kerEpic_tri3DelComSeq
            wheel_pattern: cgalpy_kerepic_tri3delcomseq-*.whl
            extra_submodule: Tri3
          - config: trid_del_epicd_4
            label: TRID Delaunay EPICD static-4
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/trid_del_epicd_4.cmake
            module_name: CGALPY_kerEpic_kerdEpicd4_tridDelDef4
            package_name: CGALPY_kerEpic_kerdEpicd4_tridDelDef4
            wheel_pattern: cgalpy_kerepic_kerdepicd4_triddeldef4-*.whl
            extra_submodule: Trid
          - config: sm_pmp_epic
            label: SM PMP EPIC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/sm_pmp_epic.cmake
            module_name: CGALPY_kerEpic_bgl_sm_pmpSmCrCcCorCccDisFdGmGrHfIntLocMesNcOriIo
            package_name: CGALPY_kerEpic_bgl_sm_pmpSmCrCcCorCccDisFdGmGrHfIntLocMesNcOriIo
            wheel_pattern: cgalpy_kerepic_bgl_sm_pmpsmcrcccorcccdisfdgmgrhfintlocmesncoriio-*.whl
            extra_submodule: Sm
          - config: pol2_bso2_seg_epec
            label: POL2 via BSO2 segment EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/bso2_seg_epec.cmake
            module_name: CGALPY_kerEpecInt_aos2Seg_bso2_pol2
            package_name: CGALPY_kerEpecInt_aos2Seg_bso2_pol2
            wheel_pattern: cgalpy_kerepecint_aos2seg_bso2_pol2-*.whl
            extra_submodule: Pol2
          - config: pol3_bso2_epec
            label: POL3 BSO2 EPEC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/pol3_bso2_epec.cmake
            module_name: CGALPY_kerEpecInt_bgl_pol3Wn_pol2
            package_name: CGALPY_kerEpecInt_bgl_pol3Wn_pol2
            wheel_pattern: cgalpy_kerepecint_bgl_pol3wn_pol2-*.whl
            extra_submodule: Pol3
          - config: pol3_pmp_epic
            label: PMP POL3 EPIC
            compiler_label: Clang
            cc: clang
            cxx: clang++
            cmake_config: cmake/tests/pol3_pmp_epic.cmake
            module_name: CGALPY_kerEpic_bgl_pol3Ker_pmpPol3CrCcCorCccDisFdGmGrHfIntLocMesNcOriIo
            package_name: CGALPY_kerEpic_bgl_pol3Ker_pmpPol3CrCcCorCccDisFdGmGrHfIntLocMesNcOriIo
            wheel_pattern: cgalpy_kerepic_bgl_pol3ker_pmppol3crcccorcccdisfdgmgrhfintlocmesncoriio-*.whl
            extra_submodule: Pmp

    env:
      CGAL_BRANCH: gsoc2026-python_bindings
      CGAL_REPOSITORY: https://github.com/CGAL/cgal-public-dev.git
      BUILD_DIR: ${{ github.workspace }}/build/cgalpy/${{ matrix.config }}
      CGAL_BUILD_DIR: ${{ github.workspace }}/build/cgal/dev_release

    steps:
      - name: Check out cgal-python-bindings
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            ninja-build \
            clang \
            libboost-dev \
            libeigen3-dev \
            libgmp-dev \
            libmpfr-dev \
            libmetis-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install "nanobind>=2.3.0,<=2.10.2" build

      - name: Select compiler
        run: |
          set -euxo pipefail
          echo "CC=${{ matrix.cc }}" >> "${GITHUB_ENV}"
          echo "CXX=${{ matrix.cxx }}" >> "${GITHUB_ENV}"
          "${{ matrix.cxx }}" --version

      - name: Check out CGAL development branch
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${CGAL_BRANCH}" "${CGAL_REPOSITORY}" "${{ github.workspace }}/cgal"

      - name: Configure CGAL
        run: |
          set -euxo pipefail
          cmake \
            -S "${{ github.workspace }}/cgal" \
            -B "${CGAL_BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCGAL_WITH_tests=OFF \
            -DCGAL_WITH_examples=OFF \
            -DCGAL_WITH_demos=OFF \
            -DCGAL_WITH_benchmarks=OFF
          grep -E '^CGAL_FULL_VERSION:INTERNAL=' "${CGAL_BUILD_DIR}/CMakeCache.txt" || true

      - name: Build CGAL configure targets
        run: |
          set -euxo pipefail
          cmake --build "${CGAL_BUILD_DIR}" --parallel 2

      - name: Locate nanobind CMake package
        id: nanobind
        run: |
          set -euxo pipefail
          NANOBIND_DIR="$(python - <<'PY'
          import pathlib
          import nanobind
          print(pathlib.Path(nanobind.__file__).resolve().parent / "cmake")
          PY
          )"
          test -f "${NANOBIND_DIR}/nanobind-config.cmake"
          echo "dir=${NANOBIND_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Configure cgal-python-bindings kernel smoke
        run: |
          set -euxo pipefail
          cmake \
            -S "${{ github.workspace }}" \
            -B "${BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCGALPY_WITH_VISUAL:BOOL=OFF \
            -DCGALPY_FIXED_LIBRARY_NAME:BOOL=OFF \
            -DPython_EXECUTABLE="$(command -v python)" \
            -Dnanobind_DIR="${{ steps.nanobind.outputs.dir }}" \
            -DCGAL_DIR="${CGAL_BUILD_DIR}" \
            -C "${{ github.workspace }}/${{ matrix.cmake_config }}"

      - name: Build extension, stubs, and package
        run: |
          set -euxo pipefail
          cmake --build "${BUILD_DIR}" --target BUILD --parallel 2

      - name: Import from build tree
        run: |
          set -euxo pipefail
          PYTHONPATH="${BUILD_DIR}/src/libs" python - <<'PY'
          import importlib
          import os

          module_name = os.environ["MODULE_NAME"]

          pkg = importlib.import_module("cgalpy")
          print("cgalpy:", pkg.__file__)

          mod = importlib.import_module(f"cgalpy.{module_name}")
          print("extension:", mod.__file__)

          ker = getattr(mod, "Ker", None)
          assert ker is not None
          assert hasattr(ker, "Point_2")
          assert hasattr(ker, "area")

          extra_submodule = os.environ.get("EXTRA_SUBMODULE", "")
          if extra_submodule:
              submodule = getattr(mod, extra_submodule, None)
              assert submodule is not None
              if extra_submodule == "Aos2":
                  assert hasattr(submodule, "Arrangement_2")
              elif extra_submodule == "Bso2":
                  assert hasattr(submodule, "join")
                  assert (
                      hasattr(submodule, "Polygon_set_2")
                      or hasattr(submodule, "General_polygon_set_2")
                  )
              elif extra_submodule == "Ss2":
                  assert hasattr(submodule, "compute_intersection_points")
                  assert hasattr(submodule, "do_intersect")
              elif extra_submodule == "Ms2":
                  assert hasattr(submodule, "minkowski_sum_2")
                  assert hasattr(submodule, "offset_polygon_2")
              elif extra_submodule == "Tri2":
                  assert hasattr(submodule, "Triangulation_2")
                  assert hasattr(submodule, "Triangulation_data_structure_2")
              elif extra_submodule == "Tri3":
                  assert hasattr(submodule, "Delaunay_triangulation_3")
                  assert hasattr(submodule, "Triangulation_data_structure_3")
              elif extra_submodule == "Trid":
                  assert hasattr(submodule, "Delaunay_triangulation")
                  assert hasattr(submodule, "Triangulation_ds")
              elif extra_submodule == "Sm":
                  assert hasattr(submodule, "Surface_mesh_3")
                  assert hasattr(submodule, "add_vertex")
              elif extra_submodule == "Pol2":
                  assert hasattr(submodule, "Polygon_2")
                  assert hasattr(submodule, "Polygon_with_holes_2")
              elif extra_submodule == "Pol3":
                  assert hasattr(submodule, "Polyhedron_3")
                  assert hasattr(submodule, "make_tetrahedron")
              elif extra_submodule == "Pmp":
                  assert hasattr(submodule, "area")
                  assert hasattr(submodule, "triangulate_faces")

          print("build-tree import smoke: OK")
          PY
        env:
          MODULE_NAME: ${{ matrix.module_name }}
          EXTRA_SUBMODULE: ${{ matrix.extra_submodule }}

      - name: Compare curated BSO2 examples with CGAL C++
        if: matrix.config == 'bso2_seg_epec' || matrix.config == 'bso2_cs_epec' || matrix.config == 'bso2_conic_epec' || matrix.config == 'bso2_bezier_ccr'
        run: |
          set -euxo pipefail
          WORK_DIR="${{ github.workspace }}/build/cgalpy/example_compare/${{ matrix.config }}"
          rm -rf "${WORK_DIR}"

          case "${{ matrix.config }}" in
            bso2_seg_epec)
              pairs=(
                bso2_simple_join_intersect
                bso2_symmetric_difference
                bso2_sequence
                bso2_do_intersect
                bso2_oriented_side
              )
              ;;
            bso2_cs_epec)
              pairs=(
                bso2_circle_segment
                bso2_set_union
              )
              ;;
            bso2_conic_epec)
              pairs=(
                bso2_conic_traits_adapter
              )
              ;;
            bso2_bezier_ccr)
              pairs=(
                bso2_bezier_traits_adapter
              )
              ;;
            *)
              echo "No curated BSO2 comparisons for ${{ matrix.config }}"
              exit 0
              ;;
          esac

          for pair in "${pairs[@]}"
          do
            python src/python_scripts/cgalpy_examples/compare_examples.py \
              --pair "${pair}" \
              --cgal-source "${{ github.workspace }}/cgal" \
              --cgal-dir "${CGAL_BUILD_DIR}" \
              --python-build "${BUILD_DIR}" \
              --library "${{ matrix.module_name }}" \
              --python-executable "$(command -v python)" \
              --work-dir "${WORK_DIR}" \
              --build-type Release
          done

      - name: Install generated wheel in clean venv
        run: |
          set -euxo pipefail
          WHEEL="$(find "${BUILD_DIR}/src/libs/cgalpy/dist" -maxdepth 1 -type f -name "${WHEEL_PATTERN}" | sort | tail -1)"
          test -n "${WHEEL}"
          python -m venv /tmp/cgalpy-wheel-test
          /tmp/cgalpy-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/cgalpy-wheel-test/bin/python -m pip install "${WHEEL}"
          /tmp/cgalpy-wheel-test/bin/python - <<'PY'
          import importlib
          import os

          package_name = os.environ["PACKAGE_NAME"]
          module_name = os.environ["MODULE_NAME"]

          pkg = importlib.import_module(package_name)
          print("wheel package:", pkg.__file__)

          mod = importlib.import_module(f"{package_name}.{module_name}")
          print("wheel extension:", mod.__file__)

          ker = getattr(mod, "Ker", None)
          assert ker is not None
          assert hasattr(ker, "Point_2")
          assert hasattr(ker, "area")

          extra_submodule = os.environ.get("EXTRA_SUBMODULE", "")
          if extra_submodule:
              submodule = getattr(mod, extra_submodule, None)
              assert submodule is not None
              if extra_submodule == "Aos2":
                  assert hasattr(submodule, "Arrangement_2")
              elif extra_submodule == "Bso2":
                  assert hasattr(submodule, "join")
                  assert (
                      hasattr(submodule, "Polygon_set_2")
                      or hasattr(submodule, "General_polygon_set_2")
                  )
              elif extra_submodule == "Ss2":
                  assert hasattr(submodule, "compute_intersection_points")
                  assert hasattr(submodule, "do_intersect")
              elif extra_submodule == "Ms2":
                  assert hasattr(submodule, "minkowski_sum_2")
                  assert hasattr(submodule, "offset_polygon_2")
              elif extra_submodule == "Tri2":
                  assert hasattr(submodule, "Triangulation_2")
                  assert hasattr(submodule, "Triangulation_data_structure_2")
              elif extra_submodule == "Tri3":
                  assert hasattr(submodule, "Delaunay_triangulation_3")
                  assert hasattr(submodule, "Triangulation_data_structure_3")
              elif extra_submodule == "Trid":
                  assert hasattr(submodule, "Delaunay_triangulation")
                  assert hasattr(submodule, "Triangulation_ds")
              elif extra_submodule == "Sm":
                  assert hasattr(submodule, "Surface_mesh_3")
                  assert hasattr(submodule, "add_vertex")
              elif extra_submodule == "Pol2":
                  assert hasattr(submodule, "Polygon_2")
                  assert hasattr(submodule, "Polygon_with_holes_2")
              elif extra_submodule == "Pol3":
                  assert hasattr(submodule, "Polyhedron_3")
                  assert hasattr(submodule, "make_tetrahedron")
              elif extra_submodule == "Pmp":
                  assert hasattr(submodule, "area")
                  assert hasattr(submodule, "triangulate_faces")

          print("wheel import smoke: OK")
          PY
        env:
          MODULE_NAME: ${{ matrix.module_name }}
          PACKAGE_NAME: ${{ matrix.package_name }}
          WHEEL_PATTERN: ${{ matrix.wheel_pattern }}
          EXTRA_SUBMODULE: ${{ matrix.extra_submodule }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cgalpy-${{ matrix.config }}-linux-artifacts
          path: |
            ${{ env.BUILD_DIR }}/src/libs/cgalpy/dist/*.whl
            ${{ env.BUILD_DIR }}/src/libs/cgalpy/dist/*.tar.gz
          if-no-files-found: error

  kernel-macos-minimal:
    name: EPEC kernel smoke on macOS (AppleClang)
    runs-on: macos-15

    env:
      CGAL_BRANCH: gsoc2026-python_bindings
      CGAL_REPOSITORY: https://github.com/CGAL/cgal-public-dev.git
      BUILD_DIR: ${{ github.workspace }}/build/cgalpy/epec_macos
      CGAL_BUILD_DIR: ${{ github.workspace }}/build/cgal/dev_release
      MODULE_NAME: CGALPY_kerEpecInt
      PACKAGE_NAME: CGALPY_kerEpecInt
      WHEEL_PATTERN: cgalpy_kerepecint-*.whl

    steps:
      - name: Check out cgal-python-bindings
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja boost eigen gmp mpfr metis
          echo "CMAKE_PREFIX_PATH=$(brew --prefix)" >> "${GITHUB_ENV}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install "nanobind>=2.3.0,<=2.10.2" build

      - name: Select compiler
        run: |
          set -euxo pipefail
          echo "CC=clang" >> "${GITHUB_ENV}"
          echo "CXX=clang++" >> "${GITHUB_ENV}"
          clang++ --version

      - name: Check out CGAL development branch
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${CGAL_BRANCH}" "${CGAL_REPOSITORY}" "${{ github.workspace }}/cgal"

      - name: Configure CGAL
        run: |
          set -euxo pipefail
          cmake \
            -S "${{ github.workspace }}/cgal" \
            -B "${CGAL_BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCGAL_WITH_tests=OFF \
            -DCGAL_WITH_examples=OFF \
            -DCGAL_WITH_demos=OFF \
            -DCGAL_WITH_benchmarks=OFF
          grep -E '^CGAL_FULL_VERSION:INTERNAL=' "${CGAL_BUILD_DIR}/CMakeCache.txt" || true

      - name: Build CGAL configure targets
        run: |
          set -euxo pipefail
          cmake --build "${CGAL_BUILD_DIR}" --parallel 2

      - name: Locate nanobind CMake package
        id: nanobind
        run: |
          set -euxo pipefail
          NANOBIND_DIR="$(python - <<'PY'
          import pathlib
          import nanobind
          print(pathlib.Path(nanobind.__file__).resolve().parent / "cmake")
          PY
          )"
          test -f "${NANOBIND_DIR}/nanobind-config.cmake"
          echo "dir=${NANOBIND_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Configure cgal-python-bindings EPEC smoke
        run: |
          set -euxo pipefail
          cmake \
            -S "${{ github.workspace }}" \
            -B "${BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCGALPY_WITH_VISUAL:BOOL=OFF \
            -DCGALPY_FIXED_LIBRARY_NAME:BOOL=OFF \
            -DPython_EXECUTABLE="$(command -v python)" \
            -Dnanobind_DIR="${{ steps.nanobind.outputs.dir }}" \
            -DCGAL_DIR="${CGAL_BUILD_DIR}" \
            -C "${{ github.workspace }}/cmake/tests/epec.cmake"

      - name: Build extension, stubs, and package
        run: |
          set -euxo pipefail
          cmake --build "${BUILD_DIR}" --target BUILD --parallel 2

      - name: Import from build tree
        run: |
          set -euxo pipefail
          PYTHONPATH="${BUILD_DIR}/src/libs" python - <<'PY'
          import importlib
          import os

          module_name = os.environ["MODULE_NAME"]

          pkg = importlib.import_module("cgalpy")
          print("cgalpy:", pkg.__file__)

          mod = importlib.import_module(f"cgalpy.{module_name}")
          print("extension:", mod.__file__)

          ker = getattr(mod, "Ker", None)
          assert ker is not None
          assert hasattr(ker, "Point_2")
          assert hasattr(ker, "area")

          print("macOS build-tree import smoke: OK")
          PY

      - name: Install generated wheel in clean venv
        run: |
          set -euxo pipefail
          WHEEL="$(find "${BUILD_DIR}/src/libs/cgalpy/dist" -maxdepth 1 -type f -name "${WHEEL_PATTERN}" | sort | tail -1)"
          test -n "${WHEEL}"
          python -m venv "${RUNNER_TEMP}/cgalpy-wheel-test"
          "${RUNNER_TEMP}/cgalpy-wheel-test/bin/python" -m pip install --upgrade pip
          "${RUNNER_TEMP}/cgalpy-wheel-test/bin/python" -m pip install "${WHEEL}"
          "${RUNNER_TEMP}/cgalpy-wheel-test/bin/python" - <<'PY'
          import importlib
          import os

          package_name = os.environ["PACKAGE_NAME"]
          module_name = os.environ["MODULE_NAME"]

          pkg = importlib.import_module(package_name)
          print("wheel package:", pkg.__file__)

          mod = importlib.import_module(f"{package_name}.{module_name}")
          print("wheel extension:", mod.__file__)

          ker = getattr(mod, "Ker", None)
          assert ker is not None
          assert hasattr(ker, "Point_2")
          assert hasattr(ker, "area")

          print("macOS wheel import smoke: OK")
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cgalpy-epec-macos-artifacts
          path: |
            ${{ env.BUILD_DIR }}/src/libs/cgalpy/dist/*.whl
            ${{ env.BUILD_DIR }}/src/libs/cgalpy/dist/*.tar.gz
          if-no-files-found: error

  kernel-windows-minimal:
    name: EPEC kernel smoke on Windows (MSVC)
    runs-on: windows-2022

    env:
      CGAL_BRANCH: gsoc2026-python_bindings
      CGAL_REPOSITORY: https://github.com/CGAL/cgal-public-dev.git
      BUILD_DIR: ${{ github.workspace }}/build/cgalpy/epec_windows
      CGAL_BUILD_DIR: ${{ github.workspace }}/build/cgal/dev_release
      MODULE_NAME: CGALPY_kerEpecInt
      PACKAGE_NAME: CGALPY_kerEpecInt
      WHEEL_PATTERN: cgalpy_kerepecint-*.whl
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Check out cgal-python-bindings
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            if (Test-Path "C:\vcpkg") {
              $env:VCPKG_INSTALLATION_ROOT = "C:\vcpkg"
            } elseif (Test-Path "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg") {
              $env:VCPKG_INSTALLATION_ROOT = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg"
            } else {
              throw "Could not locate vcpkg installation root."
            }
          }

          $toolchain = Join-Path $env:VCPKG_INSTALLATION_ROOT "scripts\buildsystems\vcpkg.cmake"
          if (-not (Test-Path $toolchain)) {
            throw "vcpkg CMake toolchain file not found: $toolchain"
          }

          "VCPKG_ROOT=$($env:VCPKG_INSTALLATION_ROOT)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_TOOLCHAIN_FILE=$toolchain" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "VCPKG_ROOT=$($env:VCPKG_INSTALLATION_ROOT)"
          Write-Host "CMAKE_TOOLCHAIN_FILE=$toolchain"

      - name: Install system dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          & "$env:VCPKG_ROOT\vcpkg.exe" version
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            boost-headers:x64-windows `
            boost-config:x64-windows `
            boost-static-assert:x64-windows `
            boost-multiprecision:x64-windows `
            boost-mpl:x64-windows `
            boost-iterator:x64-windows `
            boost-variant:x64-windows `
            boost-bind:x64-windows `
            boost-optional:x64-windows `
            boost-tuple:x64-windows `
            boost-any:x64-windows `
            boost-graph:x64-windows `
            boost-range:x64-windows `
            boost-property-map:x64-windows `
            boost-throw-exception:x64-windows `
            eigen3:x64-windows `
            gmp:x64-windows `
            mpfr:x64-windows

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          python -m pip install "nanobind>=2.3.0,<=2.10.2" build

      - name: Check out CGAL development branch
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git clone --depth 1 --branch "$env:CGAL_BRANCH" "$env:CGAL_REPOSITORY" "$env:GITHUB_WORKSPACE/cgal"

      - name: Configure CGAL
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          cmake `
            -S "$env:GITHUB_WORKSPACE/cgal" `
            -B "$env:CGAL_BUILD_DIR" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCGAL_WITH_tests=OFF `
            -DCGAL_WITH_examples=OFF `
            -DCGAL_WITH_demos=OFF `
            -DCGAL_WITH_benchmarks=OFF

          Select-String -Path "$env:CGAL_BUILD_DIR/CMakeCache.txt" -Pattern "^CGAL_FULL_VERSION:INTERNAL=" -ErrorAction SilentlyContinue

      - name: Build CGAL configure targets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --build "$env:CGAL_BUILD_DIR" --config Release --parallel 2

      - name: Locate nanobind CMake package
        id: nanobind
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $nanobindDir = python -c "import pathlib, nanobind; print(pathlib.Path(nanobind.__file__).resolve().parent / 'cmake')"
          $config = Join-Path $nanobindDir "nanobind-config.cmake"

          if (-not (Test-Path $config)) {
            throw "nanobind-config.cmake not found: $config"
          }

          "dir=$nanobindDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "nanobind_DIR=$nanobindDir"

      - name: Configure cgal-python-bindings EPEC smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $pythonExe = (Get-Command python).Source

          cmake `
            -S "$env:GITHUB_WORKSPACE" `
            -B "$env:BUILD_DIR" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS="/I$env:VCPKG_ROOT/installed/x64-windows/include" `
            -DCMAKE_CXX_FLAGS="/EHsc /I$env:VCPKG_ROOT/installed/x64-windows/include" `
            -DCGALPY_WITH_VISUAL:BOOL=OFF `
            -DCGALPY_FIXED_LIBRARY_NAME:BOOL=OFF `
            -DBoost_INCLUDE_DIR="$env:VCPKG_ROOT/installed/x64-windows/include" `
            -DBoost_INCLUDE_DIRS="$env:VCPKG_ROOT/installed/x64-windows/include" `
            -DPython_EXECUTABLE="$pythonExe" `
            -Dnanobind_DIR="${{ steps.nanobind.outputs.dir }}" `
            -DCGAL_DIR="$env:CGAL_BUILD_DIR" `
            -C "$env:GITHUB_WORKSPACE/cmake/tests/epec.cmake"

      - name: Build extension, stubs, and package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $boostInclude = Join-Path $env:VCPKG_ROOT "installed/x64-windows/include"
          $requiredBoostHeaders = @(
            "boost/config.hpp",
            "boost/static_assert.hpp",
            "boost/multiprecision/cpp_int.hpp",
            "boost/mpl/or.hpp",
            "boost/iterator/transform_iterator.hpp",
            "boost/iterator/iterator_facade.hpp",
            "boost/variant/variant.hpp",
            "boost/optional.hpp",
            "boost/tuple/tuple.hpp",
            "boost/bind/bind.hpp",
            "boost/any.hpp",
            "boost/graph/graph_traits.hpp",
            "boost/property_map/property_map.hpp",
            "boost/range/value_type.hpp",
            "boost/throw_exception.hpp"
          )

          foreach ($header in $requiredBoostHeaders) {
            $path = Join-Path $boostInclude $header
            if (-not (Test-Path $path)) {
              throw "Boost header not found at $path"
            }
          }
          $env:INCLUDE = "$boostInclude;$env:INCLUDE"
          Write-Host "MSVC INCLUDE begins with: $boostInclude"
          cmake --build "$env:BUILD_DIR" --target BUILD --config Release --parallel 2

      - name: Import from build tree
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $env:PYTHONPATH = "$env:BUILD_DIR\src\libs"
          $scriptPath = Join-Path $env:RUNNER_TEMP "build_tree_smoke.py"

          @'
          import importlib
          import os

          module_name = os.environ["MODULE_NAME"]

          pkg = importlib.import_module("cgalpy")
          print("cgalpy:", pkg.__file__)

          mod = importlib.import_module(f"cgalpy.{module_name}")
          print("extension:", mod.__file__)

          ker = getattr(mod, "Ker", None)
          assert ker is not None
          assert hasattr(ker, "Point_2")
          assert hasattr(ker, "area")

          print("Windows build-tree import smoke: OK")
          '@ | Set-Content -Path $scriptPath -Encoding UTF8

          python $scriptPath

      - name: Install generated wheel in clean venv
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $distDir = Join-Path $env:BUILD_DIR "src\libs\cgalpy\dist"
          $wheel = Get-ChildItem -Path $distDir -Filter $env:WHEEL_PATTERN | Sort-Object Name | Select-Object -Last 1

          if (-not $wheel) {
            throw "No wheel matched pattern $env:WHEEL_PATTERN in $distDir"
          }

          $venv = Join-Path $env:RUNNER_TEMP "cgalpy-wheel-test"
          python -m venv $venv
          $venvPython = Join-Path $venv "Scripts\python.exe"

          & $venvPython -m pip install --upgrade pip
          & $venvPython -m pip install $wheel.FullName

          $scriptPath = Join-Path $env:RUNNER_TEMP "wheel_smoke.py"

          @'
          import importlib
          import os

          package_name = os.environ["PACKAGE_NAME"]
          module_name = os.environ["MODULE_NAME"]

          pkg = importlib.import_module(package_name)
          print("wheel package:", pkg.__file__)

          mod = importlib.import_module(f"{package_name}.{module_name}")
          print("wheel extension:", mod.__file__)

          ker = getattr(mod, "Ker", None)
          assert ker is not None
          assert hasattr(ker, "Point_2")
          assert hasattr(ker, "area")

          print("Windows wheel import smoke: OK")
          '@ | Set-Content -Path $scriptPath -Encoding UTF8

          & $venvPython $scriptPath

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cgalpy-epec-windows-artifacts
          path: |
            ${{ env.BUILD_DIR }}/src/libs/cgalpy/dist/*.whl
            ${{ env.BUILD_DIR }}/src/libs/cgalpy/dist/*.tar.gz
          if-no-files-found: error
