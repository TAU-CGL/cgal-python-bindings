pipelines:
  default:
    - parallel:
        - step:
            name: Test
            image: ubuntu:latest
            script:
              - export DEBIAN_FRONTEND=noninteractive
              - export TZ=Asia/Kolkata
              - apt-get update
              - apt-get install -yq cmake g++ python3-pip python3 libcgal-dev git python3.12-venv make
              - python3 -m venv venv
              - source venv/bin/activate
              - git clone https://github.com/wjakob/nanobind.git
              - cd nanobind
              - git submodule update --init --recursive
              - export nanobind_DIR=$(pwd)
              - cd ..
              - mkdir build
              - cd build
              - cmake -C ../cmake/tests/release/aos2_epec_fixed_release.cmake ../
              - make -j4
              - pip install ../src/dist/CGALPY-1.0.0-cp38-cp38-linux_x86_64.whl

