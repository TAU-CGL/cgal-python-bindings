# bitbucket-pipelines.yml

image: python:latest

pipelines:
  tags:
    '*':
      - step:
          name: Build wheels with cibuildwheel
          services:
            - docker  # Required for cibuildwheel to build Linux wheels
          script:
            # Install Docker client
            - apt-get update && apt-get install -y docker.io
            # Install cibuildwheel and build wheels
            - pip install cibuildwheel
            - cibuildwheel --output-dir wheelhouse
          artifacts:
            - wheelhouse/**  # Save built wheels for next step

      - step:
          name: Publish to PyPI
          script:
            - pip install twine
            # Verify wheels exist and upload
            - ls wheelhouse/
            - twine upload --repository-url https://test.pypi.org/legacy/ wheelhouse/* -u $TWINE_USERNAME -p $TWINE_PASSWORD
