
pipelines:
  default:
    - parallel:
        steps:
          - step:
              name: Test aos2_alg_epec examples
              image: ubuntu:latest
              script:
                - export DEBIAN_FRONTEND=noninteractive
                - export TZ=Asia/Kolkata
                - apt-get update
                - apt-get install -yq cmake g++ python3-pip python3 git python3.12-venv make libgmp3-dev libboost-all-dev libmpfr-dev qt6-base-dev libeigen3-dev
                - git clone https://github.com/CGAL/cgal.git
                - cd cgal
                - mkdir build
                - cd build
                - cmake ..
                - make install
                - cd ../..
                - python3 -m venv venv
                - source venv/bin/activate
                - python -m pip install build
                - git clone https://github.com/wjakob/nanobind.git
                - cd nanobind
                - git submodule update --init --recursive
                - export nanobind_DIR=$(pwd)
                - cd ..
                - mkdir build
                - cd build
                - cmake -C ../cmake/tests/test/aos2_alg_epec_test.cmake ../
                - make
                - pip install src/libs/cgalpy/dist/*.whl
                - cd ../src/python_scripts # go to examples
                - ./compare_examples.sh ../../cgal algebraic_curves.py algebraic_segments.py # run examples
      
